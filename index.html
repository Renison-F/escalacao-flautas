<!doctype html>
<html lang="pt-BR" data-bs-theme="light">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Escalação • Flautas</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

  <style>
    body {
      background: #f6f7fb;
      min-height: 100vh;
    }

    .app-shell {
      max-width: 1100px;
    }

    .card {
      border-radius: 1.25rem;
      border: 1px solid rgba(15, 23, 42, .06);
    }

    .card .card-header {
      border-top-left-radius: 1.25rem;
      border-top-right-radius: 1.25rem;
      background: #ffffff;
      border-bottom: 1px solid rgba(15, 23, 42, .06);
    }

    .soft-shadow {
      box-shadow: 0 10px 24px rgba(15, 23, 42, .06);
    }

    .badge-chip {
      border: 1px solid rgba(15, 23, 42, .08);
      font-weight: 600;
      letter-spacing: .1px;
    }

    .mono {
      font-variant-numeric: tabular-nums;
    }

    .sticky-toolbar {
      position: sticky;
      top: .75rem;
      z-index: 1020;
    }

    .toolbar {
      border: 1px solid rgba(15, 23, 42, .08);
      background: #ffffff;
    }

    /* ===== Chips ===== */
    .chip {
      border: 1px solid rgba(15, 23, 42, .10);
      padding: .38rem .62rem;
    }

    .chip-renison {
      color: #0b3a8a;
      background: #dbeafe;
    }

    .chip-flavio {
      color: #065f46;
      background: #d1fae5;
    }

    .chip-isabella {
      color: #9d174d;
      background: #fce7f3;
    }

    .chip-miguel {
      color: #92400e;
      background: #fef3c7;
    }

    /* ===== PDF buttons (pequeno e alinhado) ===== */
    .part-left {
      display: flex;
      align-items: center;
      gap: .5rem;
      min-width: 180px;
    }

    .pdf-actions .btn {
      padding: .22rem .45rem;
      line-height: 1;
    }

    .pdf-actions .btn i {
      font-size: 1rem;
    }

    /* ===== Destaque do ensaio ===== */
    .is-rehearsal {
      border-color: rgba(37, 99, 235, .30) !important;
      box-shadow: 0 10px 24px rgba(37, 99, 235, .10);
    }

    .is-rehearsal .card-header {
      background: #eff6ff;
      border-bottom-color: rgba(37, 99, 235, .15);
    }

    .rehearsal-badge {
      color: #1e40af;
      background: #dbeafe;
      border: 1px solid rgba(30, 64, 175, .18);
      font-weight: 700;
    }

    /* Card do ensaio (topo) */
    .rehearsal-card {
      border: 1px solid rgba(37, 99, 235, .22);
      background: #ffffff;
      border-radius: 1.25rem;
    }

    .rehearsal-card .title {
      display: flex;
      align-items: center;
      gap: .5rem;
      font-weight: 800;
    }

    .rehearsal-list .item {
      border-top: 1px solid rgba(15, 23, 42, .06);
      padding-top: .75rem;
      margin-top: .75rem;
    }

    .mini-pdf .btn {
      padding: .16rem .38rem;
      line-height: 1;
    }

    @media print {
      .no-print {
        display: none !important;
      }

      body {
        background: #fff !important;
      }

      .soft-shadow {
        box-shadow: none !important;
      }

      .card {
        break-inside: avoid;
      }
    }
  </style>
</head>

<body>
  <div class="container app-shell py-4">

    <header class="sticky-toolbar no-print" role="banner">
      <div
        class="toolbar soft-shadow rounded-4 p-3 d-flex flex-column flex-md-row gap-2 align-items-md-center justify-content-between">
        <div class="d-flex align-items-center gap-2">
          <span class="d-inline-flex align-items-center justify-content-center rounded-3 bg-primary-subtle text-primary"
            style="width:40px;height:40px;" aria-hidden="true">
            <i class="bi bi-music-note-beamed fs-5"></i>
          </span>
          <div>
            <h1 class="h6 fw-bold mb-0">Escalação (Flautas)</h1>
            <p class="text-body-secondary small mb-0">Cards com música, compositor, instrumentação e PDFs</p>
          </div>
        </div>

        <nav class="d-flex gap-2" aria-label="Ações">
          <button id="copyBtn" class="btn btn-primary">
            <i class="bi bi-clipboard-check me-1" aria-hidden="true"></i> Copiar
          </button>
          <!-- Se quiser imprimir, descomente:
          <button class="btn btn-outline-secondary" onclick="window.print()">
            <i class="bi bi-printer me-1" aria-hidden="true"></i> Imprimir
          </button>
          -->
        </nav>
      </div>
    </header>

    <!-- Card dinâmico do ensaio (hoje / próximo / último) -->
    <section id="rehearsalSection" class="mt-3 no-print" aria-label="Ensaio (dinâmico)"></section>

    <main role="main" class="mt-3">
      <section aria-label="Resumo e legenda"
        class="d-flex flex-wrap gap-2 align-items-center justify-content-between mb-2">
        <p class="small text-body-secondary mb-0" aria-live="polite">
          <span class="mono" id="visibleCount">0</span> de <span class="mono" id="totalCount">0</span> músicas
        </p>

        <div class="d-flex flex-wrap gap-2" aria-label="Legenda">
          <span class="badge text-bg-light badge-chip"><i class="bi bi-dot me-1" aria-hidden="true"></i>Flauta 1</span>
          <span class="badge text-bg-light badge-chip"><i class="bi bi-dot me-1" aria-hidden="true"></i>Flauta 2</span>
          <span class="badge text-bg-light badge-chip"><i class="bi bi-file-earmark-pdf me-1"
              aria-hidden="true"></i>PDF</span>
          <span class="badge rehearsal-badge badge-chip"><i class="bi bi-star-fill me-1"
              aria-hidden="true"></i>Ensaio</span>
        </div>
      </section>

      <section aria-label="Lista de músicas">
        <ul id="cardsGrid" class="row g-4 list-unstyled m-0 p-0"></ul>
      </section>
    </main>

    <footer class="text-center text-body-secondary small py-4" role="contentinfo"></footer>
  </div>

    // =========================================
    // 2) ENSAIOS
    //    date no formato YYYY-MM-DD
    // =========================================
    const rehearsals = [
      {
        date: "2026-03-05",
        time: "19:30",
        songs: ["cast_away", "forrest_gump", "interstellar"], // <- só IDs daqui
      }

      // ,{ date:"2026-03-12", time:"19:30", songs:["jurassic_park","schindlers_list"] }

    // Se quiser que as músicas do ensaio apareçam primeiro na lista:
    const PIN_REHEARSAL_TO_TOP = true;

    const grid = document.getElementById("cardsGrid");
    const copyBtn = document.getElementById("copyBtn");
    const visibleCount = document.getElementById("visibleCount");
    const totalCount = document.getElementById("totalCount");
    const rehearsalSection = document.getElementById("rehearsalSection");

    function escapeHtml(str) {
      return String(str)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function escapeAttr(str) {
      return escapeHtml(str);
    }

    function chip(name) {
      const map = {
        "Renison": "chip-renison",
        "Flávio": "chip-flavio",
        "Isabella": "chip-isabella",
        "Miguel": "chip-miguel",
      };
      const cls = map[name] || "";
      return `<span class="badge rounded-pill chip ${cls} badge-chip me-1 mb-1">${escapeHtml(name)}</span>`;
    }

    function pdfButtons(pdfUrl) {
      if (!pdfUrl) {
        return `
          <div class="btn-group btn-group-sm pdf-actions" role="group" aria-label="PDF indisponível">
            <button class="btn btn-outline-secondary" disabled title="PDF não informado">
              <i class="bi bi-file-earmark-pdf" aria-hidden="true"></i>
            </button>
            <button class="btn btn-outline-secondary" disabled title="PDF não informado">
              <i class="bi bi-download" aria-hidden="true"></i>
            </button>
          </div>
        `;
      }

      const url = escapeAttr(pdfUrl);
      return `
        <div class="btn-group btn-group-sm pdf-actions" role="group" aria-label="PDF da parte">
          <a class="btn btn-outline-secondary"
             href="${url}" target="_blank" rel="noopener"
             title="Abrir PDF em nova aba" aria-label="Abrir PDF">
            <i class="bi bi-file-earmark-pdf" aria-hidden="true"></i>
          </a>
          <a class="btn btn-outline-secondary"
             href="${url}" download
             title="Baixar PDF" aria-label="Baixar PDF">
            <i class="bi bi-download" aria-hidden="true"></i>
          </a>
        </div>
      `;
    }

    function partRow(part) {
      const isF2 = part.label.toLowerCase().includes("2");
      const icon = isF2 ? "bi-2-circle" : "bi-1-circle";
      const players = part.players.map(chip).join("");
      const actions = pdfButtons(part.pdf);

      return `
        <div class="d-flex align-items-start justify-content-between gap-3">
          <div class="part-left">
            <i class="bi ${icon} text-body-secondary" aria-hidden="true"></i>
            <div class="fw-semibold">${escapeHtml(part.label)}</div>
            ${actions}
          </div>
          <div class="text-end">${players}</div>
        </div>
      `;
    }

    function cardHtml(item, idx, isRehearsal) {
      const partsHtml = item.parts.map(partRow).join(`<hr class="my-3">`);
      const composerBadge = `
        <span class="badge text-bg-light badge-chip">
          <i class="bi bi-person-lines-fill me-1" aria-hidden="true"></i>${escapeHtml(item.composer)}
        </span>`;
      const numBadge = `<span class="badge text-bg-dark badge-chip mono">#${String(idx + 1).padStart(2, "0")}</span>`;
      const rehearsalBadge = isRehearsal ?
        `<span class="badge rehearsal-badge badge-chip"><i class="bi bi-star-fill me-1" aria-hidden="true"></i>Ensaio</span>` :
        "";

      return `
        <li class="col-12 col-md-6">
          <article class="card soft-shadow h-100 ${isRehearsal ? "is-rehearsal" : ""}" data-song-id="${escapeAttr(item.id)}">
            <header class="card-header py-3 px-3 px-lg-4">
              <div class="d-flex align-items-start justify-content-between gap-3">
                <div>
                  <h2 class="h6 fw-bold mb-1">${escapeHtml(item.title)}</h2>
                  <div class="d-flex flex-wrap gap-2">
                    ${composerBadge}
                    ${rehearsalBadge}
                  </div>
                </div>
                <div class="d-flex align-items-center gap-2">${numBadge}</div>
              </div>
            </header>

            <div class="card-body px-3 px-lg-4 py-3">
              <section aria-label="Instrumentação">
                ${partsHtml}
              </section>
            </div>
          </article>
        </li>
      `;
    }

    // ===== Ensaio: resolve automaticamente pelo "hoje" do navegador =====
    function getTodayISO() {
      const d = new Date();
      const y = d.getFullYear();
      const m = String(d.getMonth() + 1).padStart(2, "0");
      const day = String(d.getDate()).padStart(2, "0");
      return `${y}-${m}-${day}`;
    }

    function formatBRDate(isoDate) {
      const [y, m, d] = isoDate.split("-").map(Number);
      const dt = new Date(y, m - 1, d);
      return new Intl.DateTimeFormat("pt-BR", {
        day: "2-digit",
        month: "2-digit",
        year: "numeric"
      }).format(dt);
    }

    function miniPdf(pdfUrl, label) {
      const url = pdfUrl ? escapeAttr(pdfUrl) : null;

      return `
        <div class="btn-group btn-group-sm mini-pdf" role="group" aria-label="PDF ${escapeAttr(label)}">
          <span class="btn btn-outline-secondary disabled" aria-hidden="true">${escapeHtml(label)}</span>
          ${url ? `
            <a class="btn btn-outline-secondary" href="${url}" target="_blank" rel="noopener" title="Abrir PDF">
              <i class="bi bi-file-earmark-pdf" aria-hidden="true"></i>
            </a>
            <a class="btn btn-outline-secondary" href="${url}" download title="Baixar PDF">
              <i class="bi bi-download" aria-hidden="true"></i>
            </a>
          ` : `
            <button class="btn btn-outline-secondary" disabled title="PDF não informado">
              <i class="bi bi-file-earmark-pdf" aria-hidden="true"></i>
            </button>
            <button class="btn btn-outline-secondary" disabled title="PDF não informado">
              <i class="bi bi-download" aria-hidden="true"></i>
            </button>
          `}
        </div>
      `;
    }

    // ====== DINÂMICO (hoje / próximo / último) ======
    const MS_DAY = 24 * 60 * 60 * 1000;

    function parseISODateToLocal(isoDate) {
      const [y, m, d] = isoDate.split("-").map(Number);
      return new Date(y, m - 1, d);
    }

    function startOfDay(dt) {
      return new Date(dt.getFullYear(), dt.getMonth(), dt.getDate());
    }

    function diffDays(a, b) {
      const A = startOfDay(a).getTime();
      const B = startOfDay(b).getTime();
      return Math.round((B - A) / MS_DAY);
    }

    function humanDays(n) {
      const abs = Math.abs(n);
      return abs === 1 ? "1 dia" : `${abs} dias`;
    }

    function getRehearsalContext(todayISO) {
      const today = parseISODateToLocal(todayISO);

      const list = rehearsals
        .map(r => ({ ...r, _dt: parseISODateToLocal(r.date) }))
        .sort((a, b) => a._dt - b._dt);

      if (!list.length) {
        return {
          hasAny: false,
          today: null,
          prev: null,
          next: null,
          focus: null,
          title: "Nenhum ensaio cadastrado",
          meta: "Cadastre datas no array rehearsals[] para ativar o card automaticamente."
        };
      }

      const todayReh = list.find(r => r.date === todayISO) || null;

      let prev = null, next = null;
      for (const r of list) {
        if (r._dt < today) prev = r;
        if (!next && r._dt > today) next = r;
      }

      const focus = todayReh || next || prev;

      let title = "Ensaio";
      if (todayReh) {
        title = "Ensaio de hoje";
      } else if (next) {
        title = `Próximo ensaio em ${humanDays(diffDays(today, next._dt))}`;
      } else {
        title = `Último ensaio foi há ${humanDays(diffDays(prev._dt, today))}`;
      }

      let metaParts = [];
      if (prev) metaParts.push(`Último: ${formatBRDate(prev.date)} (há ${humanDays(diffDays(prev._dt, today))})`);
      if (next) metaParts.push(`Próximo: ${formatBRDate(next.date)} (em ${humanDays(diffDays(today, next._dt))})`);

      return {
        hasAny: true,
        today: todayReh,
        prev,
        next,
        focus,
        title,
        meta: metaParts.join(" • ")
      };
    }

    function renderRehearsal(todayISO, ctx, indexById) {
      const r = ctx.focus;

      const dateBR = r ? formatBRDate(r.date) : "";
      const time = r?.time ? ` • ${escapeHtml(r.time)}h` : "";
      const metaLine = ctx.meta ? `<div class="text-body-secondary small mt-1">${escapeHtml(ctx.meta)}</div>` : "";

      const songsResolved = (r?.songs || [])
        .map(id => indexById.get(id))
        .filter(Boolean);

      const itemsHtml = songsResolved.map(song => {
        const f1 = song.parts.find(p => p.label.toLowerCase().includes("1"));
        const f2 = song.parts.find(p => p.label.toLowerCase().includes("2"));

        return `
          <div class="item">
            <div class="d-flex flex-column flex-md-row align-items-md-center justify-content-between gap-2">
              <div>
                <div class="fw-bold">${escapeHtml(song.title)}</div>
                <div class="text-body-secondary small">${escapeHtml(song.composer)}</div>
              </div>

              <div class="d-flex flex-wrap gap-2">
                ${miniPdf(f1?.pdf, "Flauta 1")}
                ${miniPdf(f2?.pdf, "Flauta 2")}
              </div>
            </div>
          </div>
        `;
      }).join("");

      rehearsalSection.innerHTML = `
        <div class="rehearsal-card soft-shadow p-3 p-lg-4">
          <div class="d-flex flex-column flex-md-row gap-2 align-items-md-center justify-content-between">
            <div class="title">
              <i class="bi bi-calendar2-check text-primary" aria-hidden="true"></i>
              <span>${escapeHtml(ctx.title)}</span>
              ${r ? `<span class="badge rehearsal-badge badge-chip ms-1">${dateBR}${time}</span>` : ``}
            </div>

            <div class="text-body-secondary small">
              PDFs prontos para abrir/baixar
            </div>
          </div>

          ${metaLine}

          <div class="rehearsal-list mt-2">
            ${
              r
                ? (itemsHtml || `<div class="text-body-secondary small mt-2">Nenhuma música configurada para este ensaio.</div>`)
                : `<div class="text-body-secondary small mt-2">Sem ensaio para mostrar.</div>`
            }
          </div>
        </div>
      `;
    }

    function render() {
      const todayISO = getTodayISO();

      // index por id
      const indexById = new Map(data.map(x => [x.id, x]));

      // contexto (hoje / próximo / último)
      const ctx = getRehearsalContext(todayISO);

      // ensaio “em foco” (hoje > próximo > último)
      const focus = ctx.focus;

      // set para pin + badge "Ensaio"
      const rehearsalSet = new Set(focus ? focus.songs : []);

      // seção do ensaio (dinâmica)
      renderRehearsal(todayISO, ctx, indexById);

      // ordenação: músicas do ensaio em foco primeiro (se habilitado)
      const list = [...data];
      if (PIN_REHEARSAL_TO_TOP && focus) {
        list.sort((a, b) => {
          const ar = rehearsalSet.has(a.id) ? 0 : 1;
          const br = rehearsalSet.has(b.id) ? 0 : 1;
          if (ar !== br) return ar - br;
          return a.title.localeCompare(b.title);
        });
      }

      grid.innerHTML = list
        .map((item, idx) => cardHtml(item, idx, rehearsalSet.has(item.id)))
        .join("");

      visibleCount.textContent = list.length;
      totalCount.textContent = data.length;
    }

    function toPlainText() {
      return data.map(item => {
        const lines = [];
        lines.push(`Musica: ${item.title} • ${item.composer}`);
        item.parts.forEach(p => lines.push(`${p.label} • ${p.players.join(" • ")}`));
        lines.push("=".repeat(66));
        return lines.join("\n");
      }).join("\n");
    }

    copyBtn.addEventListener("click", async () => {
      try {
        await navigator.clipboard.writeText(toPlainText());
        copyBtn.classList.remove("btn-primary");
        copyBtn.classList.add("btn-success");
        copyBtn.innerHTML = `<i class="bi bi-check2-circle me-1" aria-hidden="true"></i> Copiado!`;
        setTimeout(() => {
          copyBtn.classList.remove("btn-success");
          copyBtn.classList.add("btn-primary");
          copyBtn.innerHTML = `<i class="bi bi-clipboard-check me-1" aria-hidden="true"></i> Copiar`;
        }, 1200);
      } catch (e) {
        alert("Não consegui copiar automaticamente. (Permissão do navegador)");
      }
    });

    render();
  </script>
</body>

</html>
